name: cross-bump

# Weekly cross-fixture bump cron (RFC-002 §3.3, Issue #34).
#
# Schedule: Monday 06:30 UTC. 30-minute offset from cfdb's Monday 06:00
# slot prevents issue-tracker noise collision (rust-systems C3).
#
# Flow delegated to ci/cross-bump.sh, which:
#   - resolves companion (yg/cfdb) develop HEAD
#   - runs ci/cross-dogfood.sh against HEAD (COMPANION_SHA override)
#   - on exit 0: opens a bump PR updating .cfdb/cross-fixture.toml
#   - on non-zero: opens (or skips) a cross-drift-YYYY-WW issue
#
# Exposed via workflow_dispatch so a human can kick it off manually
# mid-week to pull in a fresh companion SHA without waiting for Monday.

on:
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  CARGO_INCREMENTAL: "0"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_HOME: /cache/cargo
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  SCCACHE_REDIS_ENDPOINT: "redis://192.168.1.107:6380"
  SCCACHE_REDIS_KEY_PREFIX: "graph-specs-1.93"
  SCCACHE_REDIS_EXPIRATION: "604800"

jobs:
  cross-bump:
    name: Weekly cross-fixture bump
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends \
            git build-essential libssl-dev pkg-config curl ca-certificates python3
          mkdir -p /cache/cargo/registry /cache/cargo/git /cache/cargo/bin ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git

      - name: Install sccache (rust-systems B1)
        run: |
          if [ ! -f "/cache/cargo/bin/sccache" ]; then
            SCCACHE_VERSION="v0.8.2"
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" | \
              tar xzf - --strip-components=1 -C /cache/cargo/bin/ "sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache"
            chmod +x /cache/cargo/bin/sccache
          fi
          echo "PATH=/cache/cargo/bin:${PATH}" >> "$GITHUB_ENV"
          if /cache/cargo/bin/sccache --start-server 2>&1; then
            echo "RUSTC_WRAPPER=/cache/cargo/bin/sccache" >> "$GITHUB_ENV"
          fi

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --branch develop "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: Build graph-specs binary
        run: |
          cd repo
          cargo build -p application --release

      - name: Run cross-bump orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd repo
          ./ci/cross-bump.sh
