name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feat/*'
      - 'work/*'
      - 'fix/*'
      - 'docs/*'
      - 'ci/*'
      - 'infra/*'
      - 'chore/*'
  pull_request:
    branches:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  CARGO_INCREMENTAL: "0"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_HOME: /cache/cargo
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  # sccache (RFC-002 §7 B2, rust-systems B1) — Redis-backed compile cache
  # shared with cfdb's CI to amortise cfdb-binary rebuilds and the
  # graph-specs release builds done by the dogfood + cross-dogfood jobs.
  # The key-prefix is graph-specs-scoped so we do not collide with cfdb's
  # sccache entries in the same Redis.
  SCCACHE_REDIS_ENDPOINT: "redis://192.168.1.107:6380"
  SCCACHE_REDIS_KEY_PREFIX: "graph-specs-1.93"
  SCCACHE_REDIS_EXPIRATION: "604800"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

# NOTE: jobs do not use `actions/checkout` or `actions/cache` because the
# rust:1.93 base image has no Node.js runtime (required by those actions).
# Instead, each job clones the repo manually and shares `/cache/cargo`
# via the runner's `/data/ci-cache:/cache` mount — mirroring qbot-core's
# proven pattern on the same Gitea Actions infrastructure.

jobs:
  # ----------------------------------------------------------------
  # 1. Format — rustfmt, fast-fail
  # ----------------------------------------------------------------
  fmt:
    name: Format
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          mkdir -p /cache/cargo/registry /cache/cargo/git ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git
          rustup component add rustfmt

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: cargo fmt --check
        run: |
          cd repo
          cargo fmt --check --all

  # ----------------------------------------------------------------
  # 2. Clippy (strict) — standard lints, -D warnings
  # ----------------------------------------------------------------
  clippy:
    name: Clippy (strict)
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          mkdir -p /cache/cargo/registry /cache/cargo/git ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git
          rustup component add clippy

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: cargo clippy
        run: |
          cd repo
          cargo clippy --workspace --all-targets -- -D warnings

  # ----------------------------------------------------------------
  # 3. Clippy (pedantic) — enforces the "cleanup every PR" standard
  # ----------------------------------------------------------------
  clippy-pedantic:
    name: Clippy (pedantic)
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          mkdir -p /cache/cargo/registry /cache/cargo/git ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git
          rustup component add clippy

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: cargo clippy (pedantic + nursery)
        run: |
          cd repo
          cargo clippy --workspace --all-targets -- -D warnings -W clippy::pedantic -W clippy::nursery

  # ----------------------------------------------------------------
  # 4. Build — cargo build --workspace
  # ----------------------------------------------------------------
  build:
    name: Build
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          mkdir -p /cache/cargo/registry /cache/cargo/git ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: cargo build --workspace
        run: |
          cd repo
          cargo build --workspace

  # ----------------------------------------------------------------
  # 5. Test — cargo test --workspace
  # ----------------------------------------------------------------
  test:
    name: Test
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          mkdir -p /cache/cargo/registry /cache/cargo/git ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: cargo test --workspace
        run: |
          cd repo
          cargo test --workspace

  # ----------------------------------------------------------------
  # 6. Dogfood — the unique gate this tool provides.
  #    Runs `graph-specs check` against its own specs+code, including
  #    both concept-level files (`specs/concepts/`) and v0.4
  #    bounded-context declarations (`specs/contexts/`). Fails the CI
  #    run if specs and code disagree at any configured level.
  # ----------------------------------------------------------------
  dogfood:
    name: Dogfood (graph-specs check)
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          mkdir -p /cache/cargo/registry /cache/cargo/git ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: Build graph-specs binary
        run: |
          cd repo
          cargo build -p application --release

      - name: Run dogfood check
        run: |
          cd repo
          ./target/release/graph-specs check --specs specs/ --code .

  # ----------------------------------------------------------------
  # 7. Audit — RUSTSEC advisory scan over the dep graph
  # ----------------------------------------------------------------
  audit:
    name: Audit (cargo-audit)
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          mkdir -p /cache/cargo/registry /cache/cargo/git /cache/cargo/bin ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: Install cargo-audit (cached under /cache/cargo/bin)
        run: |
          if [ ! -x /cache/cargo/bin/cargo-audit ]; then
            cargo install cargo-audit --locked --root /cache/cargo
          fi
          echo "PATH=/cache/cargo/bin:${PATH}" >> "$GITHUB_ENV"

      - name: cargo audit
        run: |
          cd repo
          /cache/cargo/bin/cargo-audit audit

  # ----------------------------------------------------------------
  # 8. cfdb — architectural ban rules (Cypher-over-syn-facts).
  #    Complements `dogfood`: dogfood checks specs↔code equivalence;
  #    cfdb checks that code does not violate forbidden patterns.
  #    Pinned rev — see .cfdb/cfdb.rev for version control.
  # ----------------------------------------------------------------
  cfdb-check:
    name: cfdb (arch ban rules)
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          mkdir -p /cache/cargo/registry /cache/cargo/git /cache/cargo/bin ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: Install sccache (rust-systems B1 — amortises cfdb rebuild)
        run: |
          if [ ! -f "/cache/cargo/bin/sccache" ]; then
            SCCACHE_VERSION="v0.8.2"
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" | \
              tar xzf - --strip-components=1 -C /cache/cargo/bin/ "sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache"
            chmod +x /cache/cargo/bin/sccache
          fi
          echo "PATH=/cache/cargo/bin:${PATH}" >> "$GITHUB_ENV"
          if /cache/cargo/bin/sccache --start-server 2>&1; then
            echo "RUSTC_WRAPPER=/cache/cargo/bin/sccache" >> "$GITHUB_ENV"
            echo "sccache ready (redis: ${SCCACHE_REDIS_ENDPOINT})"
          fi

      - name: Install cfdb (pinned rev, cached under /cache/cargo/bin)
        run: |
          CFDB_REV=$(cat repo/.cfdb/cfdb.rev)
          CFDB_STAMP=/cache/cargo/bin/.cfdb.rev
          if [ ! -x /cache/cargo/bin/cfdb ] || [ "$(cat $CFDB_STAMP 2>/dev/null)" != "$CFDB_REV" ]; then
            SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
            cargo install --git "${GITHUB_SERVER_URL}/yg/cfdb.git" --rev "$CFDB_REV" --locked --force \
              --root /cache/cargo cfdb-cli --bin cfdb
            echo "$CFDB_REV" > "$CFDB_STAMP"
          fi
          echo "PATH=/cache/cargo/bin:${PATH}" >> "$GITHUB_ENV"

      - name: Extract facts
        run: |
          cd repo
          mkdir -p .cfdb/db
          /cache/cargo/bin/cfdb extract --workspace . --db .cfdb/db --keyspace graph-specs

      - name: Determinism check
        run: |
          cd repo
          ./ci/cfdb-determinism-check.sh

      - name: Run ban rules
        run: |
          cd repo
          FAILED=0
          for RULE in .cfdb/queries/*.cypher; do
            echo "=== $RULE ==="
            /cache/cargo/bin/cfdb violations --db .cfdb/db --keyspace graph-specs --rule "$RULE" || FAILED=1
          done
          exit $FAILED

  # ----------------------------------------------------------------
  # 9. Cross-dogfood — RFC-002 §3.2.
  #    Runs THIS PR's graph-specs binary against the cfdb tree at the
  #    SHA pinned in `.cfdb/cross-fixture.toml`. Zero-false-positive
  #    invariant (§3.4) — exit 30 on any finding blocks merge. Fix at
  #    source (companion repo) or scope the rule narrower. No allowlist.
  # ----------------------------------------------------------------
  cross-dogfood:
    name: Cross-dogfood (graph-specs on cfdb)
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get update && apt-get install -y --no-install-recommends git ca-certificates curl
          mkdir -p /cache/cargo/registry /cache/cargo/git /cache/cargo/bin ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git

      - name: Install sccache (rust-systems B1 — amortises release build)
        run: |
          if [ ! -f "/cache/cargo/bin/sccache" ]; then
            SCCACHE_VERSION="v0.8.2"
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" | \
              tar xzf - --strip-components=1 -C /cache/cargo/bin/ "sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache"
            chmod +x /cache/cargo/bin/sccache
          fi
          echo "PATH=/cache/cargo/bin:${PATH}" >> "$GITHUB_ENV"
          if /cache/cargo/bin/sccache --start-server 2>&1; then
            echo "RUSTC_WRAPPER=/cache/cargo/bin/sccache" >> "$GITHUB_ENV"
            echo "sccache ready (redis: ${SCCACHE_REDIS_ENDPOINT})"
          fi

      - name: Clone
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SERVER_HOST=$(echo "${GITHUB_SERVER_URL}" | sed -E 's|https?://||')
          git config --global "url.https://oauth2:${GITEA_TOKEN}@${SERVER_HOST}/.insteadOf" "${GITHUB_SERVER_URL}/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: Build graph-specs binary
        run: |
          cd repo
          cargo build -p application --release

      - name: Run cross-dogfood against pinned cfdb SHA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd repo
          # ci/cross-dogfood.sh clones yg/cfdb at the SHA pinned in
          # .cfdb/cross-fixture.toml and runs `graph-specs check` against
          # that tree. Two SHA universes (rust-systems C1): this is
          # decoupled from .cfdb/cfdb.rev (used by the cfdb-check job).
          ./ci/cross-dogfood.sh
